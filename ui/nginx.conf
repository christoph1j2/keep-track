server {
    listen 80;
    server_name _;

    # Nasměrujeme root PŘÍMO do složky se zkompilovaným kódem frontendu
    root /usr/share/nginx/html/keeptrack;
    index index.html;

    # ---- API VOLÁNÍ ----
    # 1. Varianta: Tailscale cestu nezkrátil
    location /keeptrack/api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # 2. Varianta: Tailscale cestu zkrátil na root
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- WEBSOCKETS ----
    location /keeptrack/socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # ---- REACT FRONTEND ----
    # 1. Varianta: Dorazí cesta i s prefixem (Tailscale ji nechal)
    location /keeptrack/ {
        alias /usr/share/nginx/html/keeptrack/;
        try_files $uri $uri/ /keeptrack/index.html;
    }
    
    # 2. Varianta: Dorazí čistá cesta (Tailscale ji uřízl)
    location / {
        try_files $uri $uri/ /index.html;
    }
}