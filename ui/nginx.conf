server {
    listen 80;
    server_name _;

    # Tvůj původní root směřující přímo do složky s kódem
    root /usr/share/nginx/html/keeptrack;
    index index.html;

    # ---- API VOLÁNÍ ----
    location /keeptrack/api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- WEBSOCKETS ----
    location /keeptrack/socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # ---- REACT FRONTEND ----
    
    # NOVÉ: Pokud uživatel zadá přesný tvar bez lomítka, Nginx ho rovnou přesměruje.
    # To vyřeší tu React Router chybu: "is not able to match the URL /keeptrack"
    location = /keeptrack {
        return 301 $scheme://$http_host/keeptrack/;
    }

    # 1. Varianta: Dorazí cesta i s prefixem /keeptrack/
    location /keeptrack/ {
        alias /usr/share/nginx/html/keeptrack/;
        # OPRAVA: Při použití `alias` musí fallback ukazovat na vnitřní lokaci nebo 
        # přesný název souboru bez duplikace cesty. Zápis `/index.html` zde provede 
        # interní redirect na kořenový index, což je v tomto případě bezpečné.
        try_files $uri $uri/ /index.html;
    }

    # 2. Varianta: Dorazí čistá cesta /
    location / {
        # Zde funguje globální root správně, takže /index.html hledá v /usr/share/nginx/html/keeptrack/index.html
        try_files $uri $uri/ /index.html;
    }
}

