server {
    listen 80;
    server_name localhost;

    # 1. Front-end React Aplikace
    location /keeptrack/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /keeptrack/index.html;
    }

    # 2. Back-end NestJS API
    location /keeptrack/api/ {
        proxy_pass http://backend:3000/keeptrack/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Nepovinné: Kešování statických souborů pro větší rychlost
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}